name: Agent PR Validation

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test-agent-pr:
    if: startsWith(github.head_ref, 'dev/agent-')
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci || npm install
        
      - name: Run TypeScript Compiler
        id: tsc_check
        run: npx tsc --noEmit > tsc_errors.log 2>&1 || (cat tsc_errors.log && exit 1)

      - name: Report Failure to Webhook
        if: failure()
        env:
          WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET || secrets.CRON_SECRET }}
          WEBHOOK_URL: 'https://paybacker.co.uk/api/webhooks/github-agent'
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          ERR_SNIPPET=$(head -c 4000 tsc_errors.log)
          
          PAYLOAD=$(jq -n --arg branch "$BRANCH_NAME" --arg err "$ERR_SNIPPET" '{branch: $branch, errors: $err}')
          
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $WEBHOOK_SECRET" \
            -d "$PAYLOAD"
